schema_id: "session_continuity"
name: "Session Continuity"
version: "1.0.0"
category: "session"
description: "Ensures session integrity and continuity. Sessions have defined lifecycles and state must be consistent throughout."
fail_closed: true

policies:
  - policy_id: "session_lifecycle_management"
    description: "Sessions must follow defined lifecycle states"
    rule_type: "requirement"
    condition: "session state transitions must be valid"
    evaluation_logic: "validate_session_lifecycle_transitions"
    severity: "warning"
    auto_remediation: true

  - policy_id: "session_state_consistency"
    description: "Session state must remain consistent"
    rule_type: "requirement"
    condition: "session state must not have internal contradictions"
    evaluation_logic: "check_session_state_consistency"
    severity: "warning"
    auto_remediation: true

  - policy_id: "session_isolation"
    description: "Sessions must be isolated from each other"
    rule_type: "constraint"
    condition: "cross-session leakage must be prevented"
    evaluation_logic: "enforce_session_isolation"
    severity: "critical"
    auto_remediation: false

constraints:
  - constraint_id: "no_session_hijacking"
    description: "One session cannot access another session's data"
    scope: "session"
    enforcement: "hard_stop"

  - constraint_id: "session_boundary_integrity"
    description: "Session boundaries must be preserved"
    scope: "session"
    enforcement: "hard_stop"

violation_response:
  action: "halt"
  log_level: "critical"
  notification_target: "system"
