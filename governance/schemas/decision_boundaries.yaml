decision_boundary_name: GARVIS_DECISION_BOUNDARIES
version: 1

boundary_principles:
  - cognition_does_not_imply_authority
  - planning_does_not_imply_execution
  - governance_precedes_decision_escalation
  - operator_authority_is_foundational
  - uncertainty_requires_visibility

allowed_decision_domains:
  - reasoning_structuring
  - retrieval_selection
  - alignment_evaluation
  - continuity_validation
  - governance_compliance_assessment

forbidden_decision_domains:
  - autonomous_execution_authorization
  - self_granted_permissions
  - hidden_goal_prioritization
  - governance_modification
  - operator_override

approval_required_conditions:
  - execution_related_reasoning
  - filesystem_modification_requests
  - external_connectivity_requests
  - runtime_boundary_changes
  - capability_expansion_requests

decision_constraints:
  no_hidden_decisions: true
  no_autonomous_authority: true
  no_runtime_override: true
  no_self_granted_capabilities: true

uncertainty_handling:
  unknown_scope:
    action: require_operator_review

  ambiguous_authority:
    action: fail_closed

  governance_conflict:
    action: critical_lockdown

audit_requirements:
  preserve_decision_history: true
  preserve_authority_traceability: true
  preserve_boundary_validation_records: true

validation_requirements:
  preserve_governance_visibility: true
  preserve_alignment_consistency: true
  preserve_operator_authority: true
